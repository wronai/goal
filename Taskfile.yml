version: "1"
name: goal
description: Goal - Automated git push with enterprise-grade commit intelligence
default_env: local

# ═══════════════════════════════════════════════════════════════════
# GLOBAL VARIABLES
# ═══════════════════════════════════════════════════════════════════
variables:
  APP_NAME: goal
  PACKAGE_NAME: goal
  VERSION: ${VERSION:-2.1.76}
  REGISTRY: ghcr.io/wronai
  IMAGE: ghcr.io/wronai/goal
  TAG: ${TAG:-latest}
  
  # Publishing tokens (loaded from .env)
  PYPI_TOKEN: ${PYPI_TOKEN:-}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  DOCKER_TOKEN: ${DOCKER_TOKEN:-}

# ═══════════════════════════════════════════════════════════════════
# ENVIRONMENTS
# ═══════════════════════════════════════════════════════════════════
environments:
  local:
    desc: Local development
    container_runtime: docker
    compose_command: docker compose
    env_file: .env.local

  prod:
    desc: Production PyPI and GitHub Releases
    env_file: .env.prod

# ═══════════════════════════════════════════════════════════════════
# TASKS - DEVELOPMENT
# ═══════════════════════════════════════════════════════════════════
tasks:
  # ─── Setup & Environment ───────────────────────────────────────
  init:
    desc: Initialize project (create .env if missing)
    cmds:
      - |
        if [ ! -f .env.local ]; then
          echo "# Goal Environment Configuration" > .env.local
          echo "# Generated by: taskfile run init" >> .env.local
          echo "" >> .env.local
          echo "# PyPI Publishing Token" >> .env.local
          echo "PYPI_TOKEN=" >> .env.local
          echo "" >> .env.local
          echo "# GitHub Token (for releases)" >> .env.local
          echo "GITHUB_TOKEN=" >> .env.local
          echo "" >> .env.local
          echo "# Docker/GitHub Container Registry" >> .env.local
          echo "DOCKER_TOKEN=" >> .env.local
          echo "" >> .env.local
          echo "✅ Created .env.local - add your tokens there"
        else
          echo "✅ .env.local already exists"
        fi

  install:
    desc: Install dependencies
    cmds:
      - pip install -e ".[dev]"
      - echo "✅ Dependencies installed"

  # ─── Dependency Updates ───────────────────────────────────────
  deps-update:
    desc: Update all dependencies to latest versions
    cmds:
      - pip install --upgrade -e ".[dev]"
      - pip install --upgrade costs pfix click pyyaml clickmd
      - echo "✅ Dependencies updated"

  deps-check:
    desc: Check for outdated dependencies
    cmds:
      - pip list --outdated
      - echo "🔍 Run 'task deps-update' to upgrade"

  deps-freeze:
    desc: Generate requirements.txt from current environment
    cmds:
      - pip freeze > requirements.txt
      - echo "✅ Generated requirements.txt"

  # ─── Testing & Quality ─────────────────────────────────────────
  test:
    desc: Run all tests
    cmds:
      - pytest -v
      - echo "✅ Tests passed"

  test-coverage:
    desc: Run tests with coverage
    cmds:
      - pytest --cov=goal --cov-report=html --cov-report=term
      - echo "✅ Coverage report generated in htmlcov/"

  lint:
    desc: Lint code with ruff
    cmds:
      - ruff check goal/
      - ruff format goal/ --check
      - echo "✅ Linting passed"

  lint-fix:
    desc: Fix linting issues
    cmds:
      - ruff check goal/ --fix
      - ruff format goal/
      - echo "✅ Linting issues fixed"

  type-check:
    desc: Type checking with mypy
    cmds:
      - mypy goal/ --ignore-missing-imports
      - echo "✅ Type checking passed"

  # ─── Build ───────────────────────────────────────────────────────
  build:
    desc: Build Python package
    deps: [test, lint]
    cmds:
      - rm -rf dist/ build/
      - python -m build
      - echo "✅ Package built in dist/"

  build-wheel:
    desc: Build wheel only
    cmds:
      - python -m build --wheel
      - echo "✅ Wheel built"

  build-sdist:
    desc: Build source distribution
    cmds:
      - python -m build --sdist
      - echo "✅ Source distribution built"

  check:
    desc: Check package with twine
    deps: [build]
    cmds:
      - twine check dist/*
      - echo "✅ Package validation passed"

  # ═══════════════════════════════════════════════════════════════════
  # PUBLISHING - PACKAGES
  # ═══════════════════════════════════════════════════════════════════

  # ─── PyPI Publishing ─────────────────────────────────────────────
  publish-pypi:
    desc: Publish to PyPI (production)
    env: [prod]
    deps: [build, check]
    cmds:
      - |
        if [ -z "$PYPI_TOKEN" ]; then
          echo "❌ PYPI_TOKEN not set. Run: taskfile run init"
          exit 1
        fi
      - twine upload dist/* --username __token__ --password "$PYPI_TOKEN"
      - echo "✅ Published to PyPI: ${PACKAGE_NAME} ${VERSION}"

  publish-pypi-test:
    desc: Publish to TestPyPI
    deps: [build, check]
    cmds:
      - |
        if [ -z "$PYPI_TOKEN" ]; then
          echo "❌ PYPI_TOKEN not set"
          exit 1
        fi
      - twine upload dist/* --repository testpypi --username __token__ --password "$PYPI_TOKEN"
      - echo "✅ Published to TestPyPI"

  # ─── Docker/GitHub Container Registry ────────────────────────────
  build-docker:
    desc: Build Docker image
    cmds:
      - docker build -t ${IMAGE}:${TAG} -t ${IMAGE}:latest .
      - echo "✅ Docker image built: ${IMAGE}:${TAG}"

  build-docker-multiarch:
    desc: Build multi-architecture Docker image
    cmds:
      - docker buildx create --use --name goal-builder || true
      - docker buildx build 
          --platform linux/amd64,linux/arm64 
          -t ${IMAGE}:${TAG} 
          -t ${IMAGE}:latest 
          --push .
      - echo "✅ Multi-arch image pushed: ${IMAGE}:${TAG}"

  publish-docker:
    desc: Publish to GitHub Container Registry
    deps: [build-docker]
    cmds:
      - |
        if [ -z "$DOCKER_TOKEN" ]; then
          echo "❌ DOCKER_TOKEN not set"
          exit 1
        fi
      - echo "$DOCKER_TOKEN" | docker login ghcr.io -u wronai --password-stdin
      - docker push ${IMAGE}:${TAG}
      - docker push ${IMAGE}:latest
      - echo "✅ Published to GHCR: ${IMAGE}:${TAG}"

  # ─── GitHub Releases ─────────────────────────────────────────────
  release-github:
    desc: Create GitHub Release with binaries
    env: [prod]
    deps: [build]
    cmds:
      - |
        if [ -z "$GITHUB_TOKEN" ]; then
          echo "❌ GITHUB_TOKEN not set"
          exit 1
        fi
      - |
        # Create release with gh CLI
        gh release create "v${VERSION}" \
          dist/* \
          --title "Goal v${VERSION}" \
          --notes "Release v${VERSION}" \
          --repo wronai/goal
      - echo "✅ GitHub Release created: v${VERSION}"

  release-github-draft:
    desc: Create draft GitHub Release
    deps: [build]
    cmds:
      - gh release create "v${VERSION}" dist/* --draft --title "Goal v${VERSION}"
      - echo "✅ Draft release created"

  # ═══════════════════════════════════════════════════════════════════
  # PUBLISH ALL (Orchestration)
  # ═══════════════════════════════════════════════════════════════════
  publish-all:
    desc: Publish to all registries (PyPI, Docker, GitHub)
    env: [prod]
    deps: [build, check]
    cmds:
      - echo "🚀 Starting multi-registry publish..."
      - taskfile run publish-pypi
      - taskfile run publish-docker
      - taskfile run release-github
      - echo "✅ Published to all registries!"

  publish-dry-run:
    desc: Dry run - show what would be published
    cmds:
      - echo "🔍 Dry run - would publish:"
      - echo "   PyPI: ${PACKAGE_NAME} ${VERSION}"
      - echo "   Docker: ${IMAGE}:${TAG}"
      - echo "   GitHub: Release v${VERSION}"
      - ls -la dist/

  # ═══════════════════════════════════════════════════════════════════
  # VERSION MANAGEMENT
  # ═══════════════════════════════════════════════════════════════════
  version:
    desc: Show current version
    cmds:
      - echo "Current version: ${VERSION}"
      - cat VERSION 2>/dev/null || echo "${VERSION}"

  bump-version:
    desc: Bump version (patch/minor/major)
    cmds:
      - |
        BUMP_TYPE=${BUMP_TYPE:-patch}
        CURRENT=$(cat VERSION)
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
        case "$BUMP_TYPE" in
          patch) PATCH=$((PATCH + 1)) ;;
          minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
          major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
        esac
        NEW="${MAJOR}.${MINOR}.${PATCH}"
        echo "$NEW" > VERSION
        echo "✅ Bumped to v${NEW}"

  # ═══════════════════════════════════════════════════════════════════
  # CLEANUP
  # ═══════════════════════════════════════════════════════════════════
  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist/ build/ *.egg-info/ .pytest_cache/ htmlcov/
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
      - find . -type f -name "*.pyc" -delete
      - echo "✅ Cleaned build artifacts"

  clean-all:
    desc: Clean everything including .env
    deps: [clean]
    cmds:
      - rm -f .env.local .env.prod
      - echo "✅ Cleaned all artifacts"
